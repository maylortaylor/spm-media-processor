name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install bandit pip-audit
      # -ll = report only MEDIUM and HIGH severity; skip venv/ and __pycache__
      - run: bandit -r . -ll -x venv/,__pycache__/
      - run: pip-audit -r requirements.txt

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      # Verify all core modules are syntactically valid and importable.
      # TODO: expand into a real test suite.
      - run: |
          python -m py_compile \
            classify.py \
            analyze.py \
            export.py \
            metadata.py \
            config.py \
            calendar_client.py \
            batch.py \
            deep_batch.py \
            rename_media.py \
            process.py \
            gui_server.py
